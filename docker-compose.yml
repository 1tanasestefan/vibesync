version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: vibesync-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vibesync
      POSTGRES_PASSWORD: vibesync_secret
      POSTGRES_DB: vibesync_db
    volumes:
      - vibesync_pgdata:/var/lib/postgresql/data

volumes:
  vibesync_pgdata:
